<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 3D 模型線上展示</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        model-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <model-viewer 
        src="CAT_3D_2.glb" 
        ar 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1" 
        exposure="1"
        auto-rotate>
    </model-viewer>
    <model-viewer 
        src="CAT_3D3.glb" 
        ar 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1" 
        exposure="1"
        auto-rotate>
    </model-viewer>
